<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação HTML Interativa</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            color: #fff;
            overflow: hidden;
        }
        .slide-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            pointer-events: none;
        }
        .slide.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 🎬 CONFIGURAÇÃO DA ANIMAÇÃO DE APARECIMENTO */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Esconde os elementos inicialmente e aplica a animação quando o slide ativa */
        .slide h1, .slide p, .slide li {
            opacity: 0;
        }

        .slide.active h1, 
        .slide.active p, 
        .slide.active li {
            animation: fadeUp 0.8s ease forwards;
        }

        /* ⏱️ ATRASOS CONFIGURADOS POR ELEMENTO (EFEITO CASCATA) */
        .slide.active .delay-1 { animation-delay: 0.2s; }
        .slide.active .delay-2 { animation-delay: 1.0s; }
        .slide.active .delay-3 { animation-delay: 1.8s; }
        .slide.active .delay-4 { animation-delay: 2.6s; }

        /* Estilização Visual Básica */
        h1 {
            font-size: 3.5rem;
            margin-bottom: 25px;
            color: #00adb5;
        }
        p {
            font-size: 1.8rem;
            color: #eeeeee;
            max-width: 800px;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        ul {
            list-style: none;
            font-size: 1.8rem;
            color: #eee;
            text-align: left;
        }
        li {
            margin: 15px 0;
        }
        li::before {
            content: "• ";
            color: #00adb5;
        }
        .controls {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 10;
        }
        .btn {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
            margin-left: 10px;
        }
        .btn:hover {
            background-color: #007a80;
        }
    </style>
</head>
<body>

    <div class="slide-container">
        <!-- Slide 1: Aparecimento em parágrafos -->
        <div class="slide active">
            <h1 class="delay-1">Efeito Cascata</h1>
            <p class="delay-2">Este primeiro bloco de texto aparece logo em seguida.</p>
            <p class="delay-3">E este terceiro bloco surge um pouco mais tarde automaticamente.</p>
        </div>

        <!-- Slide 2: Exemplo com lista de tópicos -->
        <div class="slide">
            <h1 class="delay-1">Vantagens do HTML</h1>
            <ul>
                <li class="delay-2">Sem travamentos de softwares externos.</li>
                <li class="delay-3">Animações fluidas direto no navegador.</li>
                <li class="delay-4">Fácil de compartilhar com qualquer pessoa.</li>
            </ul>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="changeSlide(-1)">◀ Voltar</button>
        <button class="btn" onclick="changeSlide(1)">Avançar ▶</button>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');

        function showSlide(index) {
            // Remove o estado ativo do slide anterior
            slides[currentSlide].classList.remove('active');
            
            // Atualiza o índice do slide atual
            currentSlide = (index + slides.length) % slides.length;
            
            // Ativa o novo slide (reiniciando as animações de delay internas)
            slides[currentSlide].classList.add('active');
        }

        function changeSlide(direction) {
            showSlide(currentSlide + direction);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                changeSlide(1);
            } else if (e.key === 'ArrowLeft') {
                changeSlide(-1);
            }
        });
    </script>
</body>
</html>
